<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>退屈と廃墟</title>
  <style>
    :root{
      --bg:#05060a;
      --panel:rgba(9,12,18,.70);
      --ink:#f4f0ff;
      --ink2:#bdb6d9;
      --pink:#ff4fd8;
      --blue:#53c7ff;
      --violet:#9b6dff;
      --line:rgba(255,255,255,.10);
      --glow:0 0 12px rgba(255,79,216,.28), 0 0 18px rgba(83,199,255,.18);
    }
    *{box-sizing:border-box}
    html,body{
      margin:0;
      min-height:100%;
      background:
        radial-gradient(circle at 50% 10%, rgba(255,79,216,.13), transparent 26%),
        radial-gradient(circle at 86% 74%, rgba(83,199,255,.12), transparent 28%),
        radial-gradient(circle at 12% 82%, rgba(155,109,255,.09), transparent 26%),
        linear-gradient(180deg,#05060a 0%,#080b11 52%,#040507 100%);
      color:var(--ink);
      font-family:"Hiragino Sans","Yu Gothic","Noto Sans JP",system-ui,sans-serif;
      overflow-x:hidden;
    }
    body::before{
      content:"";
      position:fixed;
      inset:0;
      pointer-events:none;
      background:
        repeating-linear-gradient(180deg, rgba(255,255,255,.018) 0px, rgba(255,255,255,.018) 1px, transparent 1px, transparent 4px);
      opacity:.22;
    }
    .noise{
      position:fixed;
      inset:0;
      pointer-events:none;
      opacity:.07;
      background-image:radial-gradient(circle, rgba(255,255,255,.65) .6px, transparent .7px);
      background-size:14px 14px;
    }
    .wrap{
      min-height:100vh;
      width:100%;
    }
    .screen{
      width:100%;
      min-height:100vh;
      position:relative;
      overflow:hidden;
    }
    .screen::before,.screen::after{
      content:"";
      position:fixed;
      width:280px;
      height:280px;
      border-radius:50%;
      filter:blur(62px);
      opacity:.18;
      pointer-events:none;
      z-index:0;
    }
    .screen::before{top:-70px;right:-70px;background:var(--pink)}
    .screen::after{left:-80px;bottom:-80px;background:var(--blue)}
    #view{
      min-height:100vh;
      width:100%;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:42px clamp(18px, 5vw, 72px);
      position:relative;
      z-index:1;
    }

    .title-page{
      width:min(100%,900px);
      min-height:calc(100vh - 84px);
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      text-align:center;
      padding:18px 0;
    }
    .logo-box{
      margin:0 auto 22px;
      width:min(88vw,560px);
      padding:28px 24px 30px;
      border:1px solid rgba(255,255,255,.28);
      box-shadow:
        0 0 16px rgba(255,255,255,.12),
        0 0 34px rgba(255,79,216,.24),
        0 0 56px rgba(83,199,255,.18),
        inset 0 0 22px rgba(255,255,255,.035);
      background:rgba(255,255,255,.018);
    }
    .title{
      margin:0;
      font-size:clamp(3rem,9vw,6.2rem);
      line-height:1.1;
      letter-spacing:.08em;
      color:#fff8fe;
      text-shadow:
        0 0 6px rgba(255,255,255,.82),
        0 0 17px rgba(255,79,216,.76),
        0 0 34px rgba(255,79,216,.58),
        0 0 70px rgba(83,199,255,.34);
      animation:flicker 5.7s infinite;
    }
    .copy{
      color:var(--ink2);
      line-height:1.9;
      margin:0 auto 30px;
      max-width:32em;
      font-size:.95rem;
      text-shadow:0 0 12px rgba(83,199,255,.15);
    }

    .page{
      width:min(100%,920px);
      min-height:calc(100vh - 84px);
      border:1px solid rgba(255,255,255,.105);
      background:var(--panel);
      padding:clamp(28px,5vw,54px);
      box-shadow:
        inset 0 0 30px rgba(255,255,255,.02),
        0 0 42px rgba(0,0,0,.30),
        0 0 82px rgba(255,79,216,.06);
      display:flex;
      flex-direction:column;
      justify-content:center;
    }
    .label{
      color:var(--ink2);
      font-size:.72rem;
      letter-spacing:.30em;
      margin-bottom:16px;
      text-shadow:0 0 10px rgba(83,199,255,.16);
    }
    .heading{
      margin:0 0 22px;
      font-size:clamp(1.65rem,3.4vw,2.35rem);
      line-height:1.35;
      text-shadow:var(--glow);
    }
    .text{
      columns:1;
    }
    .text p{
      margin:0 0 13px;
      line-height:1.9;
      color:#e9e4fb;
      font-size:clamp(.88rem,1.7vw,.98rem);
      letter-spacing:.01em;
    }
    .bracket{
      margin:20px 0 0;
      padding:15px 17px;
      border-left:2px solid rgba(255,79,216,.62);
      background:rgba(255,255,255,.035);
      color:#eee9ff;
      line-height:1.82;
      font-size:clamp(.84rem,1.55vw,.94rem);
      text-shadow:0 0 10px rgba(255,79,216,.10);
    }
    .divider-title{
      margin:24px 0 12px;
      color:var(--ink2);
      font-size:.78rem;
      letter-spacing:.22em;
      text-align:center;
    }
    .machine{
      margin:10px 0 20px;
      border:1px solid rgba(255,255,255,.14);
      background:rgba(255,255,255,.025);
      box-shadow:0 0 26px rgba(255,79,216,.08), inset 0 0 18px rgba(83,199,255,.025);
      overflow:hidden;
    }
    .machine-title{
      padding:12px 14px;
      border-bottom:1px solid rgba(255,255,255,.10);
      color:#fffafd;
      letter-spacing:.10em;
      font-size:.82rem;
      text-shadow:0 0 12px rgba(255,79,216,.28);
      background:linear-gradient(90deg, rgba(255,79,216,.10), rgba(83,199,255,.08));
    }
    table{
      width:100%;
      border-collapse:collapse;
      font-size:clamp(.78rem,1.5vw,.9rem);
      color:#eee9ff;
    }
    th,td{
      padding:10px 8px;
      border-bottom:1px solid rgba(255,255,255,.08);
      text-align:left;
      white-space:nowrap;
    }
    th{
      color:var(--ink2);
      font-weight:400;
      letter-spacing:.08em;
    }
    td:nth-child(3), th:nth-child(3){
      text-align:right;
      font-variant-numeric:tabular-nums;
    }
    .instruction{
      color:var(--ink2);
      font-size:.84rem;
      margin:18px 0 9px;
      line-height:1.8;
    }
    .input{
      width:100%;
      padding:13px 15px;
      border-radius:0;
      border:1px solid rgba(255,255,255,.18);
      background:rgba(0,0,0,.25);
      color:#fff;
      font-size:.96rem;
      outline:none;
      box-shadow:inset 0 0 16px rgba(255,255,255,.025);
    }
    .input:focus{
      border-color:rgba(255,255,255,.42);
      box-shadow:0 0 20px rgba(255,79,216,.12), inset 0 0 16px rgba(255,255,255,.025);
    }
    .buttons{
      display:flex;
      gap:10px;
      margin-top:18px;
      flex-wrap:wrap;
    }
    .btn{
      border:none;
      appearance:none;
      cursor:pointer;
      background:transparent;
      color:#fffafd;
      border:1px solid rgba(255,255,255,.22);
      padding:13px 26px;
      font-size:.92rem;
      letter-spacing:.16em;
      border-radius:999px;
      min-width:128px;
      box-shadow:
        0 0 0 1px rgba(255,255,255,.03) inset,
        0 0 18px rgba(255,79,216,.18),
        0 0 28px rgba(83,199,255,.08);
      text-shadow:0 0 8px rgba(255,255,255,.45),0 0 20px rgba(255,79,216,.35);
      transition:.25s ease;
    }
    .btn.full{width:100%}
    .btn:hover{
      transform:translateY(-1px) scale(1.01);
      border-color:rgba(255,255,255,.45);
      box-shadow:0 0 0 1px rgba(255,255,255,.04) inset,0 0 24px rgba(255,79,216,.26),0 0 36px rgba(83,199,255,.14);
    }
    .hint{
      display:none;
      margin-top:14px;
      padding:14px;
      border-left:2px solid rgba(83,199,255,.55);
      background:rgba(255,255,255,.035);
      color:var(--ink2);
      line-height:1.8;
      font-size:.86rem;
    }
    .msg{
      min-height:1.6em;
      margin-top:14px;
      line-height:1.8;
      color:var(--ink2);
      font-size:.9rem;
    }
    .msg.ok{color:#fffafd;text-shadow:0 0 14px rgba(83,199,255,.28)}
    .msg.ng{color:#ffd7f3}
    @keyframes flicker{
      0%,18%,22%,24%,62%,64%,100%{opacity:1}
      19%,23%,63%{opacity:.82}
      20%,21%,72%{opacity:.92}
    }
    @media(min-width:860px){
      .text.wide{
        columns:2;
        column-gap:42px;
      }
      .text.wide p{
        break-inside:avoid;
      }
    }
    @media(max-width:520px){
      #view{padding:18px 14px}
      .title-page{min-height:calc(100vh - 36px)}
      .page{min-height:calc(100vh - 36px); padding:26px 18px}
      .buttons{flex-direction:column}
      .btn{width:100%}
      th,td{padding:9px 6px}
    }
  </style>
</head>
<body>
  <div class="noise"></div>
  <div class="wrap">
    <main class="screen">
      <div id="view"></div>
    </main>
  </div>

  <script>
    const view = document.getElementById("view");
    let roomIndex = 0;

    const introPages = [
      {
        label:"入場",
        heading:"悪くない人生だった。",
        wide:true,
        body:`<p>友人がいる。恋人もいる。仕事もある。</p><p>職場ではそれなりに必要とされていて、自分がいないと少し困る場面もある。誰かと食事に行けば笑えるし、旅行の写真を見返せば、あの時は楽しかったと思える。</p><p>美味しいご飯は、美味しい。きれいな景色は、きれい。優しい言葉は、ちゃんと優しい。</p><p>それなのに、全部がそこで終わってしまう。</p><p>足りないものがあるわけじゃない。むしろ、平均のほんの少し上を歩いている自覚があった。</p><p>不幸ぶるには恵まれすぎている。幸せだと言い切るには、どこかがずっと空いている。</p><p>つまらない。</p><p>そう思った瞬間、自分のことが少し嫌になる。この生活をつまらないと言えてしまうほど、自分は何様なんだろうと思う。けれど、そう思うことと、満たされることは別だった。</p>`
      },
      {
        label:"入口",
        heading:"閉店前のゲームセンターに寄った。",
        wide:true,
        body:`<p>行きたかったわけじゃない。ただ、まっすぐ帰るのが嫌だった。</p><p>家には帰る場所がある。連絡をくれる人もいる。明日の予定もある。悪くない夜だった。</p><p>でも、悪くないだけの夜を、そのまま終わらせるのが少し怖かった。</p><p>店の奥で、UFOキャッチャーだけがまだ光っていた。ガラスの内側には、ぬいぐるみや箱物の景品が詰め込まれている。欲しいかと聞かれたら、欲しい。</p><p>少なくとも、アームを動かしている間は本当に欲しい。</p><p>爪の角度を見て、重心を読んで、滑り止めの位置を疑って、あと一手で落ちそうなのに落ちないものに、もう一回だけ百円を入れる。</p><div class="bracket">取れるかもしれないと思っている時間だけ、<br>身体の奥に少しだけ電気が通る。</div>`
      }
    ];

    const rooms = [
      {
        label:"第一遊戯室",
        heading:"UFOキャッチャー",
        display:"UFOキャッチャー",
        answer:"もういちど",
        before:[
          {
            wide:true,
            body:`<p>景品口に落ちた瞬間、熱はすぐに引いていく。</p><p>さっきまであんなに欲しかったものが、袋に入れた途端、ただの物になる。家に持ち帰っても開けない。飾らない。たぶん、そのうち忘れる。</p><p>欲しかったのは、景品そのものじゃなかったのかもしれない。</p><p>取れるかもしれないと思っている時間。取れなくて、考えて、もう一度だけ試したくなる数十秒。そこにしか、うまく火がつかなかった。</p>`
          }
        ],
        puzzleStory:`<p>ガラスの内側に、いくつかの景品札が貼られていた。</p><p>落とし口のすぐ手前で止まっているものだけ、少しだけ光って見える。</p>`,
        quote:`落ちる直前のものだけが、<br>まだ少しだけ光って見える。`,
        clue:`<div class="machine">
            <div class="machine-title">景品札</div>
            <table>
              <thead>
                <tr><th>台</th><th>景品札</th><th>落とし口まで</th></tr>
              </thead>
              <tbody>
                <tr><td>1号機</td><td>もぐら</td><td>あと1cm</td></tr>
                <tr><td>2号機</td><td>くうき</td><td>あと2cm</td></tr>
                <tr><td>3号機</td><td>あおい</td><td>あと3cm</td></tr>
                <tr><td>4号機</td><td>よるみち</td><td>あと4cm</td></tr>
                <tr><td>5号機</td><td>まどろみ</td><td>あと2cm</td></tr>
              </tbody>
            </table>
          </div>`,
        hint:"落とし口までの数字を、景品札の文字位置として見てください。",
        after:[
          {
            wide:true,
            body:`<p>送信すると、景品口で何かが落ちる音がした。今度は、ちゃんと入っていた。</p><p>さっきまであんなに欲しかったものが、手の中で急に静かになる。</p><p>その代わり、筐体の画面に小さく文字が出ている。</p><div class="bracket">もういちど</div><p>それを見た瞬間、少しだけ息がしやすくなった。</p><p>取れたことより、次があることの方がずっとよかった。終わらなかった。まだ、終わっていない。</p>`
          }
        ]
      }
    ];

    const endingPages = [
      {
        label:"つづく",
        heading:"まだ、次がある。",
        body:`<p>ゲームセンターの奥で、別の筐体が小さく光った。</p><p>景品袋を持ったまま、そちらへ歩いていく。中身はもうどうでもよかった。けれど、次の百円を入れる前の数秒だけは、まだ少しだけ楽しみだった。</p>`
      }
    ];

    function setView(html){
      view.innerHTML = html;
      window.scrollTo({top:0, behavior:"smooth"});
    }

    function renderTitle(){
      setView(`
        <section class="title-page">
          <div class="logo-box"><h1 class="title">退屈と廃墟</h1></div>
          <p class="copy">悪くない人生なのに、<br>どこにも届かない夜のために。</p>
          <button class="btn full" onclick="startGame()">はじめる</button>
        </section>
      `);
    }

    function showPages(pages, done, nextText="次へ"){
      let i = 0;
      const render = () => {
        const p = pages[i];
        setView(`
          <section class="page">
            <div class="label">${p.label}</div>
            <h2 class="heading">${p.heading}</h2>
            <div class="text ${p.wide ? "wide" : ""}">${p.body}</div>
            <div class="buttons">
              <button class="btn full" onclick="window.__nextPage()">${i === pages.length - 1 ? nextText : "次へ"}</button>
            </div>
          </section>
        `);
      };
      window.__nextPage = () => {
        i += 1;
        if(i < pages.length) render();
        else done();
      };
      render();
    }

    function startGame(){
      showPages(introPages, () => showRoomIntro(0), "謎を見る");
    }

    function showRoomIntro(index){
      roomIndex = index;
      const r = rooms[index];
      const pages = r.before.map((item, i) => ({
        label:r.label,
        heading:r.heading,
        body:typeof item === "string" ? item : item.body,
        wide:typeof item === "string" ? false : item.wide
      }));
      showPages(pages, renderPuzzle, "謎を見る");
    }

    function renderPuzzle(){
      const r = rooms[roomIndex];
      setView(`
        <section class="page">
          <div class="label">${r.label}</div>
          <h2 class="heading">${r.heading}</h2>
          <div class="text">${r.puzzleStory}</div>
          <div class="bracket">${r.quote}</div>
          <div class="divider-title">手がかり</div>
          <div class="clue">${r.clue}</div>
          <p class="instruction">こたえはひらがなで入力してください。</p>
          <input class="input" id="answerInput" placeholder="こたえ" autocomplete="off" autocapitalize="off" />
          <div class="buttons">
            <button class="btn" onclick="checkAnswer()" type="button">送信する</button>
            <button class="btn" onclick="toggleHint()" type="button">ヒント</button>
          </div>
          <div class="hint" id="hintBox">${r.hint}</div>
          <div class="msg" id="answerMsg"></div>
        </section>
      `);
      document.getElementById("answerInput").addEventListener("keydown", (e) => {
        if(e.key === "Enter") checkAnswer();
      });
    }

    function normalize(value){
      return value.replace(/\s/g,"").replace(/[ァ-ン]/g, ch => String.fromCharCode(ch.charCodeAt(0) - 0x60));
    }

    function toggleHint(){
      const hint = document.getElementById("hintBox");
      hint.style.display = hint.style.display === "block" ? "none" : "block";
    }

    function checkAnswer(){
      const input = document.getElementById("answerInput");
      const msg = document.getElementById("answerMsg");
      const r = rooms[roomIndex];
      if(normalize(input.value) === r.answer){
        msg.textContent = "正解。まだ終わっていません。";
        msg.className = "msg ok";
        setTimeout(() => {
          const pages = r.after.map((item) => ({
            label:r.label,
            heading:"獲得",
            body:typeof item === "string" ? item : item.body,
            wide:typeof item === "string" ? false : item.wide
          }));
          showPages(pages, () => {
            if(roomIndex + 1 < rooms.length) showRoomIntro(roomIndex + 1);
            else showPages(endingPages, renderTitle, "タイトルへ");
          }, "進む");
        }, 700);
      }else{
        msg.textContent = "まだ違うみたい。手がかりをもう一度見てみてください。";
        msg.className = "msg ng";
      }
    }

    renderTitle();
  </script>
</body>
</html>
