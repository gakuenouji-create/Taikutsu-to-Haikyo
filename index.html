<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>退屈と廃墟</title>
  <style>
    :root{
      --bg:#05070d;
      --panel:rgba(8,11,19,.76);
      --ink:#f5f1ff;
      --muted:#bdb7d8;
      --pink:#ff5bd8;
      --blue:#55d7ff;
      --line:rgba(255,255,255,.12);
    }
    *{box-sizing:border-box}
    html,body{
      margin:0;
      min-height:100%;
      color:var(--ink);
      font-family:"Hiragino Sans","Yu Gothic","Noto Sans JP",system-ui,sans-serif;
      background:
        radial-gradient(circle at 50% 8%, rgba(255,91,216,.16), transparent 26%),
        radial-gradient(circle at 85% 75%, rgba(85,215,255,.12), transparent 28%),
        linear-gradient(180deg,#05070d 0%,#07101b 52%,#030407 100%);
      overflow-x:hidden;
    }
    body::before{
      content:"";
      position:fixed;
      inset:0;
      pointer-events:none;
      background:repeating-linear-gradient(180deg, rgba(255,255,255,.018) 0px, rgba(255,255,255,.018) 1px, transparent 1px, transparent 4px);
      opacity:.25;
      z-index:0;
    }
    .noise{
      position:fixed;
      inset:0;
      pointer-events:none;
      opacity:.06;
      background-image:radial-gradient(circle, rgba(255,255,255,.65) .6px, transparent .7px);
      background-size:14px 14px;
      z-index:0;
    }
    #view{
      position:relative;
      z-index:1;
      width:100%;
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:clamp(18px,4vw,54px);
    }
    .title-page{
      width:min(100%,920px);
      min-height:calc(100vh - 72px);
      display:flex;
      flex-direction:column;
      justify-content:center;
      align-items:center;
      text-align:center;
    }
    .logo-box{
      width:min(88vw,590px);
      padding:30px 24px 34px;
      border:1px solid rgba(255,255,255,.30);
      background:rgba(255,255,255,.018);
      box-shadow:
        0 0 18px rgba(255,255,255,.12),
        0 0 36px rgba(255,91,216,.26),
        0 0 64px rgba(85,215,255,.18),
        inset 0 0 24px rgba(255,255,255,.035);
      margin-bottom:24px;
    }
    h1{
      margin:0;
      font-size:clamp(3rem,9vw,6rem);
      letter-spacing:.08em;
      line-height:1.1;
      color:#fff8ff;
      text-shadow:
        0 0 8px rgba(255,255,255,.75),
        0 0 18px rgba(255,91,216,.72),
        0 0 38px rgba(255,91,216,.52),
        0 0 76px rgba(85,215,255,.30);
      animation:flicker 5.8s infinite;
    }
    .copy{
      color:var(--muted);
      line-height:1.9;
      margin:0 0 32px;
      font-size:.95rem;
      text-shadow:0 0 12px rgba(85,215,255,.16);
    }
    .page{
      width:min(100%,1100px);
      min-height:calc(100vh - 72px);
      border:1px solid var(--line);
      background:var(--panel);
      box-shadow:
        inset 0 0 30px rgba(255,255,255,.02),
        0 0 42px rgba(0,0,0,.35),
        0 0 80px rgba(255,91,216,.06);
      padding:clamp(24px,4.5vw,48px);
      display:flex;
      flex-direction:column;
      justify-content:center;
    }
    .label{
      color:var(--muted);
      font-size:.72rem;
      letter-spacing:.30em;
      margin-bottom:14px;
      text-shadow:0 0 10px rgba(85,215,255,.16);
    }
    h2{
      margin:0 0 18px;
      font-size:clamp(1.7rem,4vw,2.55rem);
      line-height:1.34;
      text-shadow:0 0 12px rgba(255,91,216,.25),0 0 18px rgba(85,215,255,.18);
    }
    p{
      margin:0 0 13px;
      line-height:1.92;
      color:#eee9ff;
      font-size:clamp(.9rem,1.6vw,1rem);
    }
    .em{
      color:#78f2ff;
      text-shadow:0 0 14px rgba(85,215,255,.26);
    }
    .bracket{
      margin:18px 0 0;
      padding:15px 17px;
      border-left:2px solid rgba(255,91,216,.68);
      background:rgba(255,255,255,.035);
      color:#eee9ff;
      line-height:1.85;
      font-size:.95rem;
    }
    .buttons{
      display:flex;
      gap:12px;
      flex-wrap:wrap;
      margin-top:24px;
    }
    .btn{
      border:none;
      appearance:none;
      cursor:pointer;
      background:transparent;
      color:#fffafd;
      border:1px solid rgba(255,255,255,.24);
      padding:13px 28px;
      font-size:.96rem;
      letter-spacing:.16em;
      border-radius:999px;
      min-width:150px;
      box-shadow:
        0 0 0 1px rgba(255,255,255,.03) inset,
        0 0 18px rgba(255,91,216,.18),
        0 0 28px rgba(85,215,255,.09);
      text-shadow:0 0 8px rgba(255,255,255,.45),0 0 20px rgba(255,91,216,.35);
      transition:.22s ease;
    }
    .btn:hover{
      transform:translateY(-1px);
      border-color:rgba(255,255,255,.46);
      box-shadow:
        0 0 0 1px rgba(255,255,255,.04) inset,
        0 0 26px rgba(255,91,216,.26),
        0 0 38px rgba(85,215,255,.14);
    }
    .btn.full{width:100%}
    .puzzle-wrap{
      display:grid;
      grid-template-columns:minmax(290px, 1fr) minmax(260px, 360px);
      gap:20px;
      align-items:start;
      margin-top:20px;
    }
    .layout-card,.memo-card,.answer-card{
      border:1px solid rgba(255,255,255,.12);
      background:rgba(5,8,15,.72);
      box-shadow:
        0 0 26px rgba(255,91,216,.08),
        inset 0 0 20px rgba(255,255,255,.02);
      overflow:hidden;
    }
    .card-title{
      padding:12px 15px;
      border-bottom:1px solid rgba(255,255,255,.10);
      color:#fffafd;
      letter-spacing:.12em;
      font-size:.86rem;
      background:linear-gradient(90deg, rgba(255,91,216,.10), rgba(85,215,255,.08));
      text-shadow:0 0 14px rgba(255,91,216,.28);
    }
    .layout-img{
      width:100%;
      display:block;
      background:#02060c;
    }
    .side{
      display:flex;
      flex-direction:column;
      gap:18px;
    }
    .memo-body{
      padding:18px 18px 20px;
    }
    .op-row,.count-row{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:16px;
      padding:12px 2px;
      border-bottom:1px dashed rgba(255,255,255,.12);
    }
    .op-row:last-child,.count-row:last-child{border-bottom:none}
    .num{
      min-width:2.2em;
      height:2.2em;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      border:1px solid rgba(255,255,255,.30);
      border-radius:8px;
      color:#fff;
      box-shadow:0 0 12px rgba(85,215,255,.10);
    }
    .arrows{
      font-size:1.55rem;
      letter-spacing:.12em;
      color:#f6f2ff;
      text-shadow:0 0 12px rgba(85,215,255,.35);
      white-space:nowrap;
    }
    .animal{
      color:#f1ebff;
      font-size:1.05rem;
    }
    .count{
      color:#ffd7f3;
      font-size:1.4rem;
      font-weight:700;
      text-shadow:0 0 14px rgba(255,91,216,.35);
    }
    .answer-card{
      margin-top:20px;
      padding:20px;
    }
    .instruction{
      color:var(--muted);
      font-size:.9rem;
      margin-bottom:10px;
    }
    .input{
      width:100%;
      padding:14px 15px;
      border-radius:0;
      border:1px solid rgba(255,255,255,.20);
      background:rgba(0,0,0,.28);
      color:#fff;
      font-size:1rem;
      outline:none;
      box-shadow:inset 0 0 16px rgba(255,255,255,.025);
    }
    .input:focus{
      border-color:rgba(255,255,255,.46);
      box-shadow:0 0 20px rgba(255,91,216,.13), inset 0 0 16px rgba(255,255,255,.025);
    }
    .hint{
      display:none;
      margin-top:14px;
      padding:14px;
      border-left:2px solid rgba(85,215,255,.60);
      background:rgba(255,255,255,.035);
      color:var(--muted);
      line-height:1.8;
      font-size:.9rem;
    }
    .msg{
      min-height:1.8em;
      margin-top:14px;
      line-height:1.8;
      color:var(--muted);
      font-size:.92rem;
    }
    .msg.ok{color:#fffafd;text-shadow:0 0 14px rgba(85,215,255,.28)}
    .msg.ng{color:#ffd7f3}
    @keyframes flicker{
      0%,18%,22%,24%,62%,64%,100%{opacity:1}
      19%,23%,63%{opacity:.82}
      20%,21%,72%{opacity:.92}
    }
    @media(max-width:820px){
      .puzzle-wrap{grid-template-columns:1fr}
      .side{display:grid;grid-template-columns:1fr 1fr;gap:14px}
    }
    @media(max-width:560px){
      #view{padding:14px}
      .page{min-height:calc(100vh - 28px);padding:22px 16px}
      .buttons{flex-direction:column}
      .btn{width:100%}
      .side{display:flex}
      .arrows{font-size:1.25rem}
      .op-row,.count-row{padding:10px 0}
    }
  </style>
</head>
<body>
  <div class="noise"></div>
  <div id="view"></div>

  <script>
    const view = document.getElementById("view");

    const introPages = [
      {
        label:"入場",
        heading:"悪くない人生だった。",
        body:`<p>友人がいる。恋人もいる。仕事もある。</p><p>職場ではそれなりに必要とされていて、自分がいないと少し困る場面もある。誰かと食事に行けば笑えるし、旅行の写真を見返せば、あの時は楽しかったと思える。</p><p>美味しいご飯は、美味しい。きれいな景色は、きれい。優しい言葉は、ちゃんと優しい。</p><p>それなのに、全部がそこで終わってしまう。</p><p>足りないものがあるわけじゃない。むしろ、平均のほんの少し上を歩いている自覚があった。</p><p>不幸ぶるには恵まれすぎている。幸せだと言い切るには、どこかがずっと空いている。</p><p>つまらない。</p><p>そう思った瞬間、自分のことが少し嫌になる。けれど、そう思うことと、満たされることは別だった。</p>`
      },
      {
        label:"入口",
        heading:"閉店前のゲームセンターに寄った。",
        body:`<p>行きたかったわけじゃない。ただ、まっすぐ帰るのが嫌だった。</p><p>家には帰る場所がある。連絡をくれる人もいる。明日の予定もある。悪くない夜だった。</p><p>でも、悪くないだけの夜を、そのまま終わらせるのが少し怖かった。</p><p>店の奥で、UFOキャッチャーだけがまだ光っていた。</p><div class="bracket">取れるかもしれないと思っている時間だけ、<br>身体の奥に少しだけ電気が通る。</div>`
      }
    ];

    function setView(html){
      view.innerHTML = html;
      window.scrollTo({top:0, behavior:"smooth"});
    }

    function renderTitle(){
      setView(`
        <section class="title-page">
          <div class="logo-box"><h1>退屈と廃墟</h1></div>
          <p class="copy">悪くない人生なのに、<br>どこにも届かない夜のために。</p>
          <button class="btn full" onclick="startGame()">はじめる</button>
        </section>
      `);
    }

    function showPages(pages, done, nextText="次へ"){
      let i = 0;
      const render = () => {
        const p = pages[i];
        setView(`
          <section class="page">
            <div class="label">${p.label}</div>
            <h2>${p.heading}</h2>
            <div>${p.body}</div>
            <div class="buttons">
              <button class="btn full" onclick="window.__nextPage()">${i === pages.length - 1 ? nextText : "次へ"}</button>
            </div>
          </section>
        `);
      };
      window.__nextPage = () => {
        i += 1;
        if(i < pages.length) render();
        else done();
      };
      render();
    }

    function startGame(){
      showPages(introPages, renderPuzzle, "謎を見る");
    }

    function renderPuzzle(){
      setView(`
        <section class="page">
          <div class="label">第一遊戯室</div>
          <h2>UFOキャッチャー</h2>
          <p>UFOキャッチャーの横には操作ログと景品排出回数のメモが貼られていた。</p>
          <p>プレイしたあなたは自然とこの言葉を口にしたはず。</p>

          <div class="puzzle-wrap">
            <div class="layout-card">
              <div class="card-title">1　商品配置</div>
              <img class="layout-img" src="assets/ufo_layout.png" alt="UFOキャッチャーの商品配置図">
            </div>

            <div class="side">
              <div class="memo-card">
                <div class="card-title">2　操作ログ</div>
                <div class="memo-body">
                  <div class="op-row"><span class="num">1</span><span class="arrows">↑↑</span></div>
                  <div class="op-row"><span class="num">2</span><span class="arrows">↑↑→→→</span></div>
                  <div class="op-row"><span class="num">3</span><span class="arrows">→→→</span></div>
                  <div class="op-row"><span class="num">4</span><span class="arrows">→</span></div>
                  <div class="op-row"><span class="num">5</span><span class="arrows">↑↑→→</span></div>
                </div>
              </div>

              <div class="memo-card">
                <div class="card-title">3　景品排出回数</div>
                <div class="memo-body">
                  <div class="count-row"><span class="animal">みどりがめ</span><span class="count">2</span></div>
                  <div class="count-row"><span class="animal">もぐら</span><span class="count">1</span></div>
                  <div class="count-row"><span class="animal">らいおん</span><span class="count">2</span></div>
                  <div class="count-row"><span class="animal">うさぎ</span><span class="count">1</span></div>
                  <div class="count-row"><span class="animal">いたち</span><span class="count">3</span></div>
                </div>
              </div>
            </div>
          </div>

          <div class="answer-card">
            <p class="instruction">こたえはひらがなで入力してください。</p>
            <input id="answer" class="input" placeholder="こたえ" autocomplete="off" autocapitalize="off">
            <div class="buttons">
              <button class="btn" onclick="checkAnswer()">送信する</button>
              <button class="btn" onclick="toggleHint()">ヒント</button>
            </div>
            <div id="hint" class="hint">操作ログで取った順番をたどり、景品排出回数の数字ぶん、名前の文字を読んでください。</div>
            <div id="msg" class="msg"></div>
          </div>
        </section>
      `);
      document.getElementById("answer").addEventListener("keydown", (e) => {
        if(e.key === "Enter") checkAnswer();
      });
    }

    function normalize(value){
      return value.replace(/\s/g,"").replace(/[ァ-ン]/g, ch => String.fromCharCode(ch.charCodeAt(0) - 0x60));
    }

    function toggleHint(){
      const hint = document.getElementById("hint");
      hint.style.display = hint.style.display === "block" ? "none" : "block";
    }

    function checkAnswer(){
      const input = document.getElementById("answer");
      const msg = document.getElementById("msg");
      if(normalize(input.value) === "もういちど"){
        msg.textContent = "正解。取れたことより、次があることの方がずっとよかった。";
        msg.className = "msg ok";
        setTimeout(renderClear, 800);
      }else{
        msg.textContent = "まだ違うみたい。取った順番と回数を見てみてください。";
        msg.className = "msg ng";
      }
    }

    function renderClear(){
      setView(`
        <section class="page">
          <div class="label">第一遊戯室 / CLEAR</div>
          <h2>景品口で、何かが落ちる音がした。</h2>
          <p>今度は、ちゃんと入っていた。</p>
          <p>さっきまであんなに欲しかったものが、手の中で急に静かになる。</p>
          <p>その代わり、筐体の画面に小さく文字が出ている。</p>
          <div class="bracket">もういちど</div>
          <p>それを見た瞬間、少しだけ息がしやすくなった。</p>
          <p>取れたことより、次があることの方がずっとよかった。</p>
          <div class="buttons">
            <button class="btn full" onclick="renderTitle()">タイトルへ</button>
          </div>
        </section>
      `);
    }

    renderTitle();
  </script>
</body>
</html>
